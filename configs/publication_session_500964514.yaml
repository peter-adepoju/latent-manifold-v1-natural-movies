project:
  name: latent-manifold-v1-natural-movies
  random_seed: 42
  output_dpi: 300
  publication_style: true
paths:
  root: .
  allen_manifest: data/raw/allen_cache/brain_observatory_manifest.json
  external_metadata: data/external/allen_v1_natural_movie_experiments.csv
  interim_dir: data/interim
  processed_dir: data/processed
  raw_dir: data/raw
  figures_dir: reports/figures
  tables_dir: reports/tables
  models_dir: models
allen:
  targeted_structures:
  - VISp
  stimuli:
  - natural_movie_one
  - natural_movie_three
  cre_lines:
  - Cux2-CreERT2
  - Cux2-CreERT2;Camk2a-tTA;Ai93
  - Rorb-IRES2-Cre
  - Rbp4-Cre_KL100
  - Ntsr1-Cre_GN220
  - Emx1-IRES-Cre
  max_experiments: 3
  download_nwb: false
  cache_stimulus_templates: true
  session_id: 500964514
  session_ids:
  - 500964514
  experiment_id: 500964514
  experiment_ids:
  - 500964514
  ophys_experiment_id: 500964514
  ophys_experiment_ids:
  - 500964514
preprocessing:
  stimulus_name: natural_movie_one
  max_repeats: 10
  expected_movie_frames: 900
  rolling_window: 101
  baseline_quantile: 0.08
  max_nan_fraction: 0.2
  min_snr: 1.5
  min_mean_dff: 0.001
  zscore_eps: 1.0e-06
  response_aggregation: mean
features:
  pca_components: 20
  embedding_dimension: 3
  umap_neighbors: 30
  umap_min_dist: 0.1
  isomap_neighbors: 10
  orientation_bins: 8
  spatial_frequency_bins: 5
  stimulus_downsample_factor: 4
  require_real_stimulus_features: true
  coarse_orientation_top_k: 2
  orientation_confidence_quantile: 0.5
  orientation_ambiguous_label: ambiguous
  confident_orientation_min_count: 30
cebra:
  enabled: true
  model_architecture: offset10-model
  conditional: time_delta
  output_dimension: 3
  max_iterations: 2000
  batch_size: 512
  learning_rate: 0.001
  distance: cosine
  device: auto
advanced_models:
  drnn_enabled: true
  sequence_length: 30
  hidden_size: 64
  epochs: 20
  batch_size: 32
  learning_rate: 0.001
  device: auto
alignment:
  enabled: true
  dnn_models:
  - alexnet
  - resnet50
  batch_size: 32
  use_pretrained_weights: true
  max_frames_for_alignment: 300
evaluation:
  n_splits: 5
  test_size: 0.2
  group_by: repeat
  random_seed: 42
  bootstrap_iterations: 200
  circular_shift_permutations: 1000
  circular_shift_min_frames: 60
  include_null_baselines: true
  n_movie_blocks: 5
  temporal_fourier_harmonics: 5
  latent_regression_alpha: 1.0
runtime:
  fail_if_missing_real_data: true
  allow_synthetic_smoke_tests_only: true
publication_session_override:
  session_id: 500964514
  ophys_experiment_id: 500964514
  reason: Generated by notebook 12c for multi-session publication upgrade.
data:
  session_id: 500964514
  session_ids:
  - 500964514
  experiment_id: 500964514
  experiment_ids:
  - 500964514
  ophys_experiment_id: 500964514
  ophys_experiment_ids:
  - 500964514
cohort:
  session_ids:
  - 500964514
  experiment_ids:
  - 500964514
  ophys_experiment_ids:
  - 500964514
  max_sessions: 1
