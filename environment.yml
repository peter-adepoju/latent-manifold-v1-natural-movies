name: v1-manifold
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy<2
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - plotly
  - h5py
  - xarray
  - pyyaml
  - jupyter
  - ipykernel
  - nbformat
  - nbconvert
  - joblib
  - pytorch
  - torchvision
  - pip:
      - allensdk==2.16.2
      - pynwb>=2.5
      - umap-learn>=0.5.5
      - cebra>=0.4.0
      - scikit-dimension>=0.3.3
      - ripser>=0.6.10
      - persim>=0.3.5
      - geomstats>=2.7
      - streamlit>=1.32
      - pytest>=7.4
      - pytest-cov>=4.1
